<!DOCTYPE html>
<html lang="pt-BR">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>
    Planejamento Semanal
  </title>

  <link rel="stylesheet" href="style.css">

</head>

<body>

  <div class="container">

    <h1>
      📚 Planejamento Semanal
    </h1>

    <div class="topo">

      <div class="campo-topo">

        <label>Semana</label>

        <input
          type="week"
          id="semana"
        >

      </div>

      <div class="campo-topo">

        <label>Filtrar Dia</label>

        <select id="filtroDia">

          <option>Todos</option>

          <option>Seg</option>
          <option>Ter</option>
          <option>Qua</option>
          <option>Qui</option>
          <option>Sex</option>

        </select>

      </div>

      <div class="campo-topo">

        <label>Filtrar Turma</label>

        <select id="filtroTurma">

          <option>Todas</option>

          <option>6º ano</option>
          <option>7º ano</option>
          <option>8º ano</option>
          <option>9º ano</option>

          <option>1ª série</option>
          <option>2ª série</option>
          <option>3ª série</option>

        </select>

      </div>

      <div class="campo-topo">

        <label>Filtrar Disciplina</label>

        <select id="filtroDisciplina">

          <option>Todas</option>

          <option>Matemática</option>
          <option>Ed. Financeira</option>
          <option>Ed. Digital</option>
          <option>Recomposição</option>

        </select>

      </div>

      <button id="salvarTudo">
        💾 Salvar
      </button>

      <button id="verRelatorio">
        📋 Relatório Geral
      </button>

    </div>

    <div
      id="alertaSemanal"
      class="alerta"
    ></div>

    <div class="tabela-container">

      <table>

        <thead>

          <tr>

            <th>Dia</th>
            <th>Turma</th>
            <th>Disciplina</th>
            <th>Conteúdo</th>
            <th>Atividade</th>

          </tr>

        </thead>

        <tbody id="tabela"></tbody>

      </table>

    </div>

  </div>

  <script src="script.js"></script>

</body>

</html>
